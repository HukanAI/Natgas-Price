<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────────
const TICKER     = 'NG=F';
const TZ         = 'Europe/Prague';
const REFRESH_MS = 10000;
const RSI_PERIOD = 14;

// Yahoo Finance limits (verified):
//   1m=7d, 5m/15m=60d (range string only — period1/2 → HTTP 422),
//   1h=730d, 1d/1wk=unlimited.
// 4h is not supported natively — fetched as 1h and resampled client-side.
const FETCH_CFG = {
  '1m':  { range: '5d',  interval: '1m',  resample: 1 },
  '5m':  { range: '1mo', interval: '5m',  resample: 1 },
  '15m': { range: '1mo', interval: '15m', resample: 1 },
  '1h':  { range: '1y',  interval: '1h',  resample: 1 },
  '4h':  { range: '1y',  interval: '1h',  resample: 4 },
  '1d':  { range: '5y',  interval: '1d',  resample: 1 },
  '1wk': { range: '10y', interval: '1wk', resample: 1 },
};

const PROXIES = [
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://proxy.cors.sh/${u}`,
];
const YF_HOSTS = ['query2.finance.yahoo.com', 'query1.finance.yahoo.com'];

// ── State ─────────────────────────────────────────────────────────────────────
let chart, candleSeries, volSeries;
let ema50S, ema200S, ema500S;
let rsiSeries, rsiOB, rsiOS, rsiMid;
let curIv       = '1h';
let refreshTimer;

// ── Prague timezone ───────────────────────────────────────────────────────────
function pragueNow() {
  return new Date().toLocaleTimeString('cs-CZ', {
    timeZone: TZ, hour: '2-digit', minute: '2-digit', second: '2-digit',
  });
}
function pragueOffsetSec(ts) {
  const d = new Date(ts * 1000);
  const mins = tz => {
    const [, t] = d.toLocaleString('en-GB', { timeZone: tz }).split(', ');
    const [h, m] = t.split(':');
    return +h * 60 + +m;
  };
  let diff = mins(TZ) - mins('UTC');
  if (diff >  720) diff -= 1440;
  if (diff < -720) diff += 1440;
  return diff * 60;
}
function shiftTs(ts) { return ts + pragueOffsetSec(ts); }
function todayPrague() { return new Date().toLocaleDateString('en-CA', { timeZone: TZ }); }
function getPrevDayClose(candles, fallback) {
  const today = todayPrague();
  for (let i = candles.length - 1; i >= 0; i--) {
    const d = new Date(candles[i].time * 1000).toLocaleDateString('en-CA', { timeZone: TZ });
    if (d < today) return candles[i].close;
  }
  return fallback;
}
setInterval(() => { g('prg-time').textContent = pragueNow(); }, 1000);
g('prg-time').textContent = pragueNow();

// ── Resample (e.g. 1h → 4h) ──────────────────────────────────────────────────
// Buckets aligned to UTC midnight: 4h = 00,04,08,12,16,20 UTC
function resample(candles, n) {
  if (n <= 1) return candles;
  const sec = n * 3600;
  const map = new Map();
  for (const c of candles) {
    const key = Math.floor(c.time / sec) * sec;
    if (!map.has(key)) {
      map.set(key, { time: key, open: c.open, high: c.high, low: c.low, close: c.close, volume: c.volume });
    } else {
      const b = map.get(key);
      if (c.high > b.high) b.high = c.high;
      if (c.low  < b.low)  b.low  = c.low;
      b.close   = c.close;
      b.volume += c.volume;
    }
  }
  return [...map.values()].sort((a, b) => a.time - b.time);
}

// ── EMA ───────────────────────────────────────────────────────────────────────
function calcEMA(closes, period) {
  const out = new Array(closes.length).fill(null);
  if (closes.length < period) return out;
  let sum = 0;
  for (let i = 0; i < period; i++) sum += closes[i];
  let ema = sum / period;
  out[period - 1] = ema;
  const k = 2 / (period + 1);
  for (let i = period; i < closes.length; i++) {
    ema = closes[i] * k + ema * (1 - k);
    out[i] = ema;
  }
  return out;
}

// ── RSI (Wilder's smoothing, period 14) ───────────────────────────────────────
function calcRSI(closes, period) {
  const out = new Array(closes.length).fill(null);
  if (closes.length < period + 1) return out;

  // Seed: simple average of first `period` gains/losses
  let avgGain = 0, avgLoss = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) avgGain += d; else avgLoss += -d;
  }
  avgGain /= period;
  avgLoss /= period;
  out[period] = avgLoss === 0 ? 100 : +(100 - 100 / (1 + avgGain / avgLoss)).toFixed(2);

  // Wilder's smoothing
  for (let i = period + 1; i < closes.length; i++) {
    const d    = closes[i] - closes[i - 1];
    const gain = d > 0 ? d : 0;
    const loss = d < 0 ? -d : 0;
    avgGain = (avgGain * (period - 1) + gain) / period;
    avgLoss = (avgLoss * (period - 1) + loss) / period;
    out[i] = avgLoss === 0 ? 100 : +(100 - 100 / (1 + avgGain / avgLoss)).toFixed(2);
  }
  return out;
}

// ── RSI colour helper ─────────────────────────────────────────────────────────
function rsiColor(v) {
  if (v == null) return '#a78bfa';
  if (v >= 70)  return '#e74c3c';
  if (v <= 30)  return '#26c281';
  return '#a78bfa';
}

// ── Wait for CDN ──────────────────────────────────────────────────────────────
function waitForLib(cb) {
  if (typeof LightweightCharts !== 'undefined') { cb(); return; }
  let n = 0;
  const id = setInterval(() => {
    if (typeof LightweightCharts !== 'undefined') { clearInterval(id); cb(); return; }
    if (++n > 100) { clearInterval(id); showErr('Failed to load chart library.'); }
  }, 100);
}

// ── Init chart ────────────────────────────────────────────────────────────────
function initChart() {
  const wrap = g('cwrap');
  const LC   = LightweightCharts;

  chart = LC.createChart(g('cv'), {
    layout: { background: { type: 'solid', color: '#0d1117' }, textColor: '#5a6478', fontFamily: 'monospace', fontSize: 11 },
    grid:   { vertLines: { color: '#131a24' }, horzLines: { color: '#131a24' } },
    crosshair: {
      mode:     LC.CrosshairMode.Normal,
      vertLine: { color: '#334155', labelBackgroundColor: '#1e2d3d' },
      horzLine: { color: '#334155', labelBackgroundColor: '#1e2d3d' },
    },
    // Main price scale: candles occupy top 60%, leaving room for volume + RSI
    rightPriceScale: { borderColor: '#1e2530', scaleMargins: { top: 0.06, bottom: 0.38 } },
    timeScale: { borderColor: '#1e2530', timeVisible: true, secondsVisible: false, rightOffset: 5, barSpacing: 8, minBarSpacing: 2 },
    handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: false },
    handleScale:  { mouseWheel: true, pinch: true, axisPressedMouseMove: true },
    width:  wrap.clientWidth,
    height: wrap.clientHeight,
  });

  // Candlesticks
  candleSeries = chart.addCandlestickSeries({
    upColor: '#26c281', downColor: '#e74c3c',
    borderUpColor: '#26c281', borderDownColor: '#e74c3c',
    wickUpColor: '#26c281', wickDownColor: '#e74c3c',
    priceFormat: { type: 'price', precision: 3, minMove: 0.001 },
  });

  // Volume — sits in the middle band
  volSeries = chart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'vol' });
  chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.72, bottom: 0.22 }, borderColor: '#1e2530' });

  // RSI line
  rsiSeries = chart.addLineSeries({
    priceScaleId: 'rsi',
    color: '#a78bfa',
    lineWidth: 1.5,
    priceLineVisible: false,
    lastValueVisible: true,
    crosshairMarkerVisible: true,
    crosshairMarkerRadius: 3,
    priceFormat: { type: 'custom', formatter: v => v.toFixed(1) },
  });
  chart.priceScale('rsi').applyOptions({
    scaleMargins: { top: 0.84, bottom: 0.02 },
    borderColor: '#1e2530',
    entireTextOnly: true,
  });

  // RSI reference lines (overbought 70, oversold 30, mid 50)
  const refOpts = { priceScaleId: 'rsi', priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false };
  rsiOB  = chart.addLineSeries({ ...refOpts, color: '#e74c3c55', lineWidth: 1, lineStyle: LC.LineStyle.Dashed });
  rsiOS  = chart.addLineSeries({ ...refOpts, color: '#26c28155', lineWidth: 1, lineStyle: LC.LineStyle.Dashed });
  rsiMid = chart.addLineSeries({ ...refOpts, color: '#33415555', lineWidth: 1, lineStyle: LC.LineStyle.Dotted });

  // EMA lines
  const emaBase = { priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false, priceFormat: { type: 'price', precision: 3, minMove: 0.001 } };
  ema50S  = chart.addLineSeries({ ...emaBase, color: '#f0c040', lineWidth: 1.5 });
  ema200S = chart.addLineSeries({ ...emaBase, color: '#e74c3c', lineWidth: 1.5 });
  ema500S = chart.addLineSeries({ ...emaBase, color: '#2196f3', lineWidth: 1.5 });

  // Crosshair tooltip
  chart.subscribeCrosshairMove(p => {
    if (!p.time || !p.seriesData) { clearTip(); return; }
    const b = p.seriesData.get(candleSeries);
    if (!b) { clearTip(); return; }
    g('hint').style.display = 'none';
    setOI('o', b.open?.toFixed(3),  '#8492a6');
    setOI('h', b.high?.toFixed(3),  '#26c281');
    setOI('l', b.low?.toFixed(3),   '#e74c3c');
    setOI('c', b.close?.toFixed(3), b.close >= b.open ? '#26c281' : '#e74c3c');
    const e50  = p.seriesData.get(ema50S);
    const e200 = p.seriesData.get(ema200S);
    const e500 = p.seriesData.get(ema500S);
    const rsi  = p.seriesData.get(rsiSeries);
    g('ev50').textContent  = e50  ? e50.value.toFixed(3)  : '—';
    g('ev200').textContent = e200 ? e200.value.toFixed(3) : '—';
    g('ev500').textContent = e500 ? e500.value.toFixed(3) : '—';
    const rv = rsi ? rsi.value : null;
    g('ev-rsi').textContent = rv != null ? rv.toFixed(1) : '—';
    g('ev-rsi').style.color = rsiColor(rv);
  });

  // Responsive resize
  new ResizeObserver(([e]) => {
    const { width, height } = e.contentRect;
    if (width > 0 && height > 0) chart.applyOptions({ width, height });
  }).observe(wrap);
}

// ── Autofit ───────────────────────────────────────────────────────────────────
function fitAll() {
  if (!chart) return;
  chart.timeScale().fitContent();
  chart.priceScale('right').applyOptions({ autoScale: true });
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function fetchWithFallback(url) {
  const errs = [];
  for (const mkP of PROXIES) {
    try {
      const res = await fetch(mkP(url), {
        headers: { Accept: 'application/json' },
        signal:  AbortSignal.timeout(12000),
      });
      if (!res.ok) { errs.push(`HTTP ${res.status}`); continue; }
      const txt = await res.text();
      if (!txt?.trim()) { errs.push('empty response'); continue; }
      return JSON.parse(txt);
    } catch (e) { errs.push(e.message); }
  }
  throw new Error('All proxies failed: ' + errs.join(' | '));
}

function buildUrl(host, cfg) {
  return `https://${host}/v8/finance/chart/${encodeURIComponent(TICKER)}` +
    `?range=${cfg.range}&interval=${cfg.interval}&includePrePost=false&events=div%7Csplit`;
}

async function fetchYF(cfg) {
  let last;
  for (const host of YF_HOSTS) {
    try { return await fetchWithFallback(buildUrl(host, cfg)); }
    catch (e) { last = e; }
  }
  throw last;
}

function parseYF(json) {
  const r = json?.chart?.result?.[0];
  if (!r) throw new Error('Yahoo Finance: ' + (json?.chart?.error?.description || 'no data'));
  const ts = r.timestamp || [], q = r.indicators?.quote?.[0] || {}, m = r.meta || {};
  if (!ts.length) throw new Error('Yahoo Finance returned empty data');
  const candles = ts
    .map((t, i) => ({ time: Math.floor(t), open: q.open?.[i], high: q.high?.[i], low: q.low?.[i], close: q.close?.[i], volume: q.volume?.[i] ?? 0 }))
    .filter(c => c.open != null && c.high != null && c.low != null && c.close != null)
    .sort((a, b) => a.time - b.time);
  if (!candles.length) throw new Error('No valid candles after filtering');
  const last = candles[candles.length - 1];
  return {
    candles,
    price:       m.regularMarketPrice   ?? last.close,
    yfPrevClose: m.chartPreviousClose   ?? null,
    volume:      m.regularMarketVolume  ?? last.volume,
    dayHigh:     m.regularMarketDayHigh ?? null,
    dayLow:      m.regularMarketDayLow  ?? null,
  };
}

// ── Main load ─────────────────────────────────────────────────────────────────
async function loadData(isRefresh) {
  setRefreshing(true);
  if (!isRefresh) showLoading();

  const cfg = FETCH_CFG[curIv];
  try {
    const json = await fetchYF(cfg);
    let { candles, price, yfPrevClose, volume, dayHigh, dayLow } = parseYF(json);

    // Resample if needed (4h = merge 4 consecutive 1h candles)
    if (cfg.resample > 1) candles = resample(candles, cfg.resample);

    // Shift timestamps to Prague local time for X axis display
    const shifted = candles.map(c => ({ ...c, time: shiftTs(c.time) }));

    // ── Candles + volume ──
    candleSeries.setData(shifted);
    volSeries.setData(shifted.map(c => ({
      time: c.time, value: c.volume,
      color: c.close >= c.open ? '#1a3d2b' : '#3d1a1a',
    })));

    // ── Indicators (computed on raw unshifted closes) ──
    const closes  = candles.map(c => c.close);
    const e50arr  = calcEMA(closes, 50);
    const e200arr = calcEMA(closes, 200);
    const e500arr = calcEMA(closes, 500);
    const rsiArr  = calcRSI(closes, RSI_PERIOD);

    const toLine = arr =>
      shifted
        .map((c, i) => arr[i] != null ? { time: c.time, value: +arr[i].toFixed(4) } : null)
        .filter(Boolean);

    ema50S.setData(toLine(e50arr));
    ema200S.setData(toLine(e200arr));
    ema500S.setData(toLine(e500arr));
    rsiSeries.setData(toLine(rsiArr));

    // RSI reference lines span the full time range
    const t0 = shifted[0].time;
    const t1 = shifted[shifted.length - 1].time;
    rsiOB.setData( [{ time: t0, value: 70 }, { time: t1, value: 70 }]);
    rsiOS.setData( [{ time: t0, value: 30 }, { time: t1, value: 30 }]);
    rsiMid.setData([{ time: t0, value: 50 }, { time: t1, value: 50 }]);

    // ── Legend last values ──
    const li = candles.length - 1;
    g('ev50').textContent  = e50arr[li]  != null ? e50arr[li].toFixed(3)  : '—';
    g('ev200').textContent = e200arr[li] != null ? e200arr[li].toFixed(3) : '—';
    g('ev500').textContent = e500arr[li] != null ? e500arr[li].toFixed(3) : '—';
    const lastRsi = rsiArr[li];
    g('ev-rsi').textContent = lastRsi != null ? lastRsi.toFixed(1) : '—';
    g('ev-rsi').style.color = rsiColor(lastRsi);

    // ── Header: daily change vs previous calendar day close ──
    const baseline = getPrevDayClose(candles, yfPrevClose);
    const ch  = baseline != null ? price - baseline : null;
    const pct = ch != null && baseline ? ch / baseline * 100 : null;
    const up  = ch == null || ch >= 0;
    const clr = up ? '#26c281' : '#e74c3c';
    const sgn = up ? '+' : '';
    setText('price', price.toFixed(3));
    g('change').textContent    = ch  != null ? sgn + ch.toFixed(3)          : '—';
    g('change').style.color    = clr;
    g('changePct').textContent = pct != null ? `(${sgn}${pct.toFixed(2)}%)` : '';
    g('changePct').style.color = clr;
    setText('vol', volume ? Number(volume).toLocaleString('en-US') : '—');

    // Today's high/low in Prague time
    const today     = todayPrague();
    const todayBars = candles.filter(c =>
      new Date(c.time * 1000).toLocaleDateString('en-CA', { timeZone: TZ }) === today
    );
    const tHigh = todayBars.length ? todayBars.reduce((m, c) => Math.max(m, c.high), -Infinity) : null;
    const tLow  = todayBars.length ? todayBars.reduce((m, c) => Math.min(m, c.low),  Infinity)  : null;
    setText('dhigh', (dayHigh ?? tHigh ?? candles.reduce((m, c) => Math.max(m, c.high), -Infinity)).toFixed(3));
    setText('dlow',  (dayLow  ?? tLow  ?? candles.reduce((m, c) => Math.min(m, c.low),  Infinity)).toFixed(3));

    // Autofit only on initial load or timeframe change — never on auto-refresh
    if (!isRefresh) fitAll();

    hideOverlay();
    resetTimer();
  } catch (e) {
    console.error(e);
    if (!isRefresh) showErr(e.message || 'Unknown error');
  } finally {
    setRefreshing(false);
  }
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function resetTimer() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => loadData(true), REFRESH_MS);
  setText('status', `Auto-refresh ${REFRESH_MS / 1000}s`);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function g(id)          { return document.getElementById(id); }
function setText(id, v) { g(id).textContent = v; }

function clearTip() {
  g('hint').style.display = '';
  ['o','h','l','c'].forEach(k => g('oi-'+k).style.display = 'none');
  ['50','200','500'].forEach(p => g('ev'+p).textContent = '—');
  g('ev-rsi').textContent = '—';
  g('ev-rsi').style.color = '#a78bfa';
}
function setOI(k, v, c) {
  g('oi-'+k).style.display = 'flex';
  g('tv-'+k).textContent   = v;
  g('tv-'+k).style.color   = c;
}
function showLoading() {
  const o = g('overlay'); o.style.display = 'flex';
  o.innerHTML = '<div id="spin"></div><div id="load-msg">Loading market data…</div>';
}
function showErr(msg) {
  const o = g('overlay'); o.style.display = 'flex';
  o.innerHTML = `<div class="ebox"><p class="etit">⚠ Failed to load data</p><p class="emsg">${msg.replace(/\n/g,'<br>')}</p><button class="rbtn2" onclick="loadData(false)">Retry</button></div>`;
}
function hideOverlay()     { g('overlay').style.display = 'none'; }
function setRefreshing(on) {
  g('dot').style.background = on ? '#e7a22b' : '#26c281';
  if (on) setText('status', 'Loading…');
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.iv').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.iv').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    curIv = btn.dataset.iv;
    clearTip();
    loadData(false);
  });
});
g('fit-btn').addEventListener('click', () => fitAll());
g('rbtn').addEventListener('click',    () => loadData(false));

// ── Boot ──────────────────────────────────────────────────────────────────────
waitForLib(() => { initChart(); loadData(false); });
</script>
</body>
</html>
