<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0d12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NatGas">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<title>NatGas Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
/* ═══ Variables ═══ */
:root{
  --bg:#0a0d12; --bg2:#11151c; --bg3:#161b22; --bg4:#1c2128; --bg5:#21262d;
  --border:#1f242c; --border2:#2a313a; --border3:#3a424d;
  --text:#e6edf3; --text2:#9ba3ad; --text3:#6e7681; --text4:#4a525c;
  --blue:#4493f8; --blue2:#1f6feb; --orange:#f0883e; --red:#ff7b72; --green:#3fb950;
  --yellow:#e3b341; --purple:#a371f7; --teal:#39c5cf;
  --font:'Inter',-apple-system,sans-serif; --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5}

/* Hide scrollbar but keep scroll functionality */
html{scrollbar-width:none}                /* Firefox */
body{-ms-overflow-style:none}             /* IE/Edge legacy */
html::-webkit-scrollbar,body::-webkit-scrollbar{width:0;height:0;display:none}  /* Chrome/Safari/Edge */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes price-flash{0%{opacity:1;transform:scaleX(1)}80%{opacity:.6}100%{opacity:0;transform:scaleX(0.2)}}

/* ═══ App shell ═══ */
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:76px 1fr;min-height:100vh;transition:grid-template-columns .2s ease}
body.sidebar-collapsed .app{grid-template-columns:56px 1fr}

/* Collapse button */
.sidebar-collapse-btn{display:flex;align-items:center;gap:8px;background:none;border:1px solid var(--border2);border-radius:6px;color:var(--text3);padding:6px 10px;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font);margin-bottom:8px;transition:background .15s,color .15s}
.sidebar-collapse-btn:hover{background:var(--bg3);color:var(--text)}
.collapse-icon{font-size:10px;transition:transform .2s ease}
body.sidebar-collapsed .collapse-icon{transform:rotate(180deg)}
body.sidebar-collapsed .collapse-label,
body.sidebar-collapsed .nav-label,
body.sidebar-collapsed .nav-section,
body.sidebar-collapsed .sidebar-footer{display:none}
body.sidebar-collapsed .sidebar{padding:14px 8px;align-items:center}
body.sidebar-collapsed .sidebar-collapse-btn{padding:8px;justify-content:center;width:36px}
body.sidebar-collapsed .nav-item{justify-content:center;padding:10px;width:36px}
body.sidebar-collapsed .nav-ico{margin:0}

/* ═══ Topbar ═══ */
.topbar{grid-column:1/3;background:var(--bg2);border-bottom:1px solid var(--border2);display:flex;align-items:stretch;padding:8px 18px;gap:8px;position:sticky;top:0;z-index:50;height:76px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:.2px;flex-shrink:0;align-self:center}
.brand-mark{width:30px;height:30px;display:block;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(244,140,60,.25))}
.brand-name{color:var(--text);font-weight:700}

/* ─ Season card ─ */
.season-card{display:flex;flex-direction:column;justify-content:center;gap:10px;padding:8px 8px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;flex-shrink:0;min-width:0;cursor:default;overflow:hidden}
.season-row1{display:flex;align-items:center;gap:5px;line-height:1}
.season-ico{font-size:12px;flex-shrink:0}
.season-name{font-size:10px;font-weight:700;color:var(--text2);white-space:nowrap;letter-spacing:.8px;text-transform:uppercase}
.season-cur-name{font-size:10px;font-weight:600;color:var(--text);white-space:nowrap;font-family:var(--mono)}
.season-row2{display:flex;align-items:baseline;gap:4px;font-size:10px;font-family:var(--mono);color:var(--text);line-height:1;white-space:nowrap}
.season-next-lbl{text-transform:uppercase;letter-spacing:.4px;font-weight:700;font-size:9px;color:var(--text3)}
.season-next-ico{font-size:11px;align-self:center}
.season-next-name{color:var(--text);font-weight:600}
.season-next-eta{color:var(--text3);margin-left:2px}

/* ─ KPI strip ─ */
.kpi-strip{display:flex;align-items:stretch;gap:5px;margin-left:auto;flex:1;max-width:1200px;justify-content:flex-end;overflow:hidden}
.kpi{padding:0 12px;display:flex;flex-direction:column;justify-content:center;gap:1px;border-right:1px solid var(--border2);min-width:90px;flex-shrink:0}

/* Prominent price cards (Front, Next) — large readable */
.price-card{padding:6px 12px;display:flex;flex-direction:column;justify-content:space-between;gap:4px;border:1px solid var(--border2);border-radius:8px;background:var(--bg3);min-width:200px;flex-shrink:0;overflow:hidden}
.price-card-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;line-height:1}
.price-card-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;font-weight:700;white-space:nowrap}
.price-card-ticker{font-size:9.5px;color:var(--text4);font-family:var(--mono);font-weight:600;letter-spacing:.5px}
.price-card-pricerow{display:flex;align-items:baseline;gap:10px;line-height:1}
.price-card-val{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1;white-space:nowrap;letter-spacing:-0.3px}
.price-card-chg{font-size:11px;font-family:var(--mono);font-weight:600;white-space:nowrap;line-height:1}
.price-card-chg.up{color:var(--green)}
.price-card-chg.down{color:var(--red)}
.price-card-chg.neu{color:var(--text2)}

/* RV20D card — slimmer */
.rv-card{padding:6px 12px;display:flex;flex-direction:column;justify-content:space-between;gap:3px;border:1px solid var(--border2);border-radius:8px;background:var(--bg3);min-width:90px;flex-shrink:0;overflow:hidden}
.rv-val{font-size:15px;line-height:1}
.rv-rank{font-size:10px;font-family:var(--mono);font-weight:500;color:var(--text);white-space:nowrap;line-height:1}

.kpi:last-of-type{border-right:none}
.kpi-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:600;white-space:nowrap;margin-bottom:1px}
.kpi-val{font-size:13.5px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1.2;white-space:nowrap}
.kpi-chg{font-size:10px;font-family:var(--mono);font-weight:500;white-space:nowrap;line-height:1.3}
.kpi-chg.up{color:var(--green)}
.kpi-chg.down{color:var(--red)}
.kpi-chg.neu{color:var(--text2)}
.kpi-chg-lbl{color:var(--text4);font-weight:600;margin-right:2px}
.kpi-price-wrap{position:relative;display:inline-block;padding-bottom:3px}
.kpi-flash-line{position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:1px;opacity:0;transform-origin:left center}
.kpi-flash-line.active{animation:price-flash 5s ease-out forwards}

/* ─ Topbar actions ─ */
.topbar-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;align-self:center}
.iconbtn{width:32px;height:32px;display:grid;place-items:center;background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s;font-family:inherit}
.iconbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--border3)}
.status-pill{display:flex;align-items:center;gap:7px;padding:5px 11px;background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.25);border-radius:6px;font-size:10px;font-weight:600;color:var(--green);font-family:var(--mono);letter-spacing:.5px}
.status-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

/* ─ Clock block (inline time · date) ─ */
.clock-block{display:flex;flex-direction:column;align-items:center;line-height:1.2;font-family:var(--mono);gap:1px}
.clock-time{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap}
.clock-sep{display:none}
.clock-date{font-size:11px;color:var(--text2);font-weight:500;white-space:nowrap;text-align:center}

/* ─ Topbar responsive — hide less-critical KPIs first ─ */
@media(max-width:1500px){
  .kpi[data-priority="3"]{display:none}
}
@media(max-width:1300px){
  .season-card .season-row2{display:none}
}
@media(max-width:1180px){
  .kpi[data-priority="2"]{display:none}
}

/* ═══ Sidebar ═══ */
.sidebar{background:var(--bg2);border-right:1px solid var(--border2);padding:14px 10px 14px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;height:calc(100vh - 76px);position:sticky;top:76px}
.nav-section{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:700;padding:12px 10px 6px}
.nav-section:first-child{padding-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;transition:all .12s;position:relative;background:none;border:none;font-family:inherit;text-align:left;width:100%}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.on{background:var(--bg3);color:var(--blue)}
.nav-item.on::before{content:"";position:absolute;left:-10px;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:var(--blue)}
.nav-ico{width:16px;height:16px;display:grid;place-items:center;color:inherit;flex-shrink:0;opacity:.85;font-size:13px}
.nav-item.on .nav-ico{opacity:1}
.nav-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-badge{font-size:9px;font-family:var(--mono);font-weight:600;padding:1px 5px;border-radius:3px;background:var(--bg4);color:var(--text3)}
.nav-badge.live{background:rgba(63,185,80,.12);color:var(--green)}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--border2);display:flex;flex-direction:column;gap:2px}
.api-counter{display:flex;justify-content:space-between;align-items:center;padding:3px 10px;font-size:10px;font-family:var(--mono);color:var(--text3)}
.api-counter .num{color:var(--text2);font-weight:600}

/* ═══ Main ═══ */
.main{padding:18px 22px 50px;overflow-x:hidden;background:var(--bg);min-width:0}

.toolbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.toolbtn:hover{background:var(--bg4);color:var(--text);border-color:var(--border3)}
.toolbtn.primary{background:var(--blue2);border-color:var(--blue);color:#fff}
.toolbtn.primary:hover{background:var(--blue);border-color:var(--blue)}

/* ═══ Master layout: overview left | cards right ═══ */
.master-grid{display:grid;grid-template-columns:280px 1fr;gap:14px;margin-bottom:16px;align-items:start}
@media(max-width:1400px){.master-grid{grid-template-columns:260px 1fr}}
@media(max-width:1100px){.master-grid{grid-template-columns:1fr}}

/* ═══ News ticker ═══ */
.news-ticker{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;height:38px;margin-bottom:14px;overflow:hidden}
.news-ticker-lbl{flex-shrink:0;padding:0 12px;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);border-right:1px solid var(--border2);height:100%;display:flex;align-items:center;background:var(--bg3)}
.news-ticker-mask{flex:1;overflow:hidden;position:relative;height:100%}
.news-ticker-content{display:flex;align-items:center;height:100%;white-space:nowrap;will-change:transform;padding-left:20px;backface-visibility:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeSpeed}
.news-item{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--text2);font-size:13px;padding:0 4px;transition:color .15s}
.news-item:hover{color:var(--blue)}
.news-time{color:var(--text4);font-family:var(--mono);font-size:11px;flex-shrink:0}
.news-title{flex-shrink:0}
.news-source{color:var(--text4);font-size:11px;font-style:italic;flex-shrink:0}
.news-sep{color:var(--text4);padding:0 14px;font-size:11px}

/* Left: Market Overview — height = column total = 346 + 14 + 380 = 740px (= 420 + 14 + 306) */
.ov-card{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;height:740px}
.ov-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;flex-shrink:0}
.ov-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:700;flex-shrink:0}
.ov-total-wrap{display:flex;align-items:baseline;gap:8px;margin-left:auto}
.ov-total{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1}
.ov-total-label{font-size:12px;font-weight:600;color:var(--text2)}
.ov-help-btn{width:22px;height:22px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);cursor:pointer;font-size:11px;font-weight:700;font-family:var(--mono);display:grid;place-items:center;transition:all .15s;flex-shrink:0}
.ov-help-btn:hover{border-color:var(--blue);color:var(--blue)}
.ov-grid{display:flex;flex-direction:column;gap:6px;flex:1}
.ov-row{display:flex;flex-direction:column;gap:4px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;flex:1;min-height:0}
.ov-row-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;min-width:0}
.ov-name{font-size:11px;font-weight:600;color:var(--text);flex:1;min-width:0;line-height:1.4}
.ov-signal{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.ov-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:2px}
.ov-detail{font-size:9.5px;color:var(--text3);font-family:var(--mono);line-height:1.5}

/* Right: two rows stacked */
.right-stack{display:grid;grid-template-columns:1fr 1fr;gap:14px;min-width:0}
.right-col{display:flex;flex-direction:column;gap:14px;min-width:0}
@media(max-width:1100px){.right-stack{grid-template-columns:1fr}}
/* Row 1 cards — Fair Price shorter, Storage taller */
.fp-card{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;height:346px}
.st-card{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;height:420px}
.fp-head,.st-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0}
.fp-title,.st-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:700;flex-shrink:0}
.fp-note,.st-note{font-size:9.5px;color:var(--text4);font-family:var(--mono);margin-left:auto}
.fp-legend,.st-legend{display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
.fp-leg-item,.st-leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);font-family:var(--mono);white-space:nowrap}
.fp-grid,.st-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;flex-shrink:0}
.fp-cell,.st-cell{padding:6px 10px;border-right:1px solid var(--border2)}
.fp-cell:first-child,.st-cell:first-child{padding-left:0}
.fp-cell:last-child,.st-cell:last-child{border-right:none}
.fp-cell-lbl,.st-cell-lbl{font-size:9px;text-transform:uppercase;color:var(--text3);letter-spacing:.5px;font-weight:600;margin-bottom:4px}
.fp-cell-val,.st-cell-val{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1.2}
.fp-cell-delta,.st-cell-delta{font-size:9.5px;font-family:var(--mono);margin-top:2px;color:var(--text3);line-height:1.4}
.fp-cell-vs,.st-cell-vs{font-size:9.5px;font-family:var(--mono);margin-top:2px;color:var(--text3);line-height:1.4}

/* Charts in row 1 — flex:1 fills the rest of the 420px card */
.fp-chart-wrap,.st-chart-wrap{flex:1;position:relative;margin-top:12px;padding-top:10px;border-top:1px solid var(--border2);min-height:0}
.fp-chart-wrap canvas,.st-chart-wrap canvas{position:absolute;inset:0;width:100%!important;height:100%!important}

/* Fair price card v2 — rich cells filling all 420px (no chart) */
.fp-grid-v2{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:0;min-height:0}
.fpv-cell{padding:8px 12px;border-right:1px solid var(--border2);display:flex;flex-direction:column;gap:6px;min-height:0}
.fpv-cell:first-child{padding-left:0}
.fpv-cell:last-child{border-right:none;padding-right:0}
.fpv-cell-lbl{font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:.8px;font-weight:700;flex-shrink:0}
.fpv-fair-row{display:flex;align-items:baseline;gap:6px;flex-shrink:0}
.fpv-fair-mini{font-size:9px;color:var(--text4);font-weight:700;letter-spacing:.5px}
.fpv-fair-val{font-size:20px;font-weight:700;font-family:var(--mono);color:#4493f8;line-height:1}
.fpv-band{font-size:10px;font-family:var(--mono);color:var(--text3);flex-shrink:0}
.fpv-section{margin-top:auto;padding-top:8px;border-top:1px solid var(--border2);display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.fpv-section-head{display:flex;justify-content:space-between;align-items:baseline}
.fpv-section-lbl-only{font-size:9px;color:var(--text4);font-weight:700;letter-spacing:.5px}
.fpv-section-lbl{font-size:9px;color:var(--text4);font-weight:700;letter-spacing:.5px}
.fpv-section-price{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text)}
.fpv-section-spread{font-size:10.5px;font-family:var(--mono);font-weight:600}
.fpv-bar-wrap{position:relative;height:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;overflow:hidden}
.fpv-bar-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,rgba(63,185,80,0.65) 0%,rgba(155,163,173,0.30) 50%,rgba(255,123,114,0.65) 100%);width:100%;border-radius:2px}
.fpv-bar-marker{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--text);box-shadow:0 0 4px rgba(0,0,0,0.4);left:50%;transform:translateX(-50%);transition:left .25s ease,background .15s}
.fpv-status{font-size:9.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;text-align:center;padding-top:1px}

/* Sticky price banner in fp-head */
.fpv-pricebar{display:flex;align-items:center;gap:14px;margin-left:auto;padding:3px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;flex-shrink:0}
.fpv-pricebar-item{display:flex;align-items:baseline;gap:6px}
.fpv-pricebar-lbl{font-size:9px;font-weight:700;letter-spacing:.6px;color:var(--text4)}
.fpv-pricebar-val{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text)}
.fpv-pricebar-sep{width:1px;height:14px;background:var(--border2)}

/* Row 2 cards */
/* Row 2 cards — Weather taller, Futures unchanged */
.hm-card{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;height:380px}
.fw-card{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;height:306px}
.fw-head,.hm-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0}
.fw-title,.hm-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:700;flex-shrink:0}
.fw-note,.hm-note{font-size:9.5px;color:var(--text4);font-family:var(--mono);margin-left:auto}

/* Futures curve chart — flex:1 fills the 260px card after header */
.fw-chart-wrap{flex:1;position:relative;min-height:0}
.fw-chart-wrap canvas{position:absolute;inset:0;width:100%!important;height:100%!important}

/* Heatmap wrap — Chart.js fills full space */
.hm-chart-wrap{flex:1;position:relative;min-height:0}
.hm-chart-wrap canvas{position:absolute;inset:0;width:100%!important;height:100%!important}

/* ═══ EIA countdown banner ═══ */
.eia-banner{display:none;align-items:center;gap:12px;padding:9px 16px;border-radius:8px;margin-bottom:14px;font-size:12px;font-family:var(--mono);border:1px solid;transition:all .3s}
.eia-banner.show{display:flex}
.eia-banner.soon{background:rgba(227,179,65,.08);border-color:rgba(227,179,65,.35);color:var(--yellow)}
.eia-banner.imminent{background:rgba(255,123,114,.1);border-color:rgba(255,123,114,.45);color:var(--red)}
.eia-banner-ico{font-size:16px;flex-shrink:0}
.eia-banner-main{font-weight:700;font-size:13px}
.eia-banner-sub{color:inherit;opacity:.75;font-size:11px;margin-left:auto}
.eia-banner-pulse{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 1s infinite;flex-shrink:0}

/* ═══ COT percentile gauge ═══ */
.cot-gauge-wrap{display:flex;flex-direction:column;gap:3px}
.cot-gauge-track{position:relative;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;width:100%}
.cot-gauge-fill{height:100%;border-radius:3px;transition:width .4s ease,background .4s ease}
.cot-gauge-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--text4);font-family:var(--mono)}
.cot-gauge-pct{font-size:9px;font-family:var(--mono);color:var(--text2);font-weight:600}

.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:18px}
.metric{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;position:relative;overflow:hidden;min-width:0}
.metric-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:600;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.metric-val{font-size:14px;font-weight:700;font-family:var(--mono);line-height:1.2;color:var(--text);word-break:break-word}
.metric-sub{font-size:9.5px;color:var(--text3);margin-top:3px;font-family:var(--mono);line-height:1.4}
.metric-sub2{font-size:9px;color:var(--text4);font-family:var(--mono);line-height:1.4}


.ov-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0}
.ov-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:700;flex-shrink:0}
.ov-total-wrap{display:flex;align-items:baseline;gap:6px;margin-left:auto}
.ov-total{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1}
.ov-total-label{font-size:11px;font-weight:600;color:var(--text2)}
.ov-help-btn{width:20px;height:20px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);cursor:pointer;font-size:10px;font-weight:700;font-family:var(--mono);display:grid;place-items:center;transition:all .15s;flex-shrink:0}
.ov-help-btn:hover{border-color:var(--blue);color:var(--blue)}
.ov-popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center;padding:20px}
.ov-popup-overlay.on{display:flex}
.ov-popup{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;max-width:620px;width:100%;max-height:85vh;overflow-y:auto;padding:22px 24px 20px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.ov-popup-title{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--text)}
.ov-popup-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;line-height:1;padding:2px 8px;border-radius:4px}
.ov-popup-close:hover{color:var(--text);background:var(--bg3)}
.ov-popup-body{font-size:12.5px;line-height:1.7;color:var(--text2)}
details[open] .details-arrow{transform:rotate(90deg)}
.details-arrow{display:inline-block;transition:transform .2s}

/* ═══ Panel (chart container) ═══ */
.panel{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:12px}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border2);gap:10px;flex-wrap:wrap}
.panel-head-l{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
.panel-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:.1px;display:flex;align-items:center;gap:8px}
.panel-title-ico{width:18px;height:18px;display:grid;place-items:center;color:var(--text3);font-size:13px;flex-shrink:0}
.panel-sub{font-size:10.5px;color:var(--text3);font-family:var(--mono)}
.panel-head-r{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.panel-body{padding:12px 14px 14px;position:relative}

/* ═══ Window tabs (segmented control) ═══ */
.window-tabs{display:flex;background:var(--bg3);border-radius:6px;padding:2px;gap:1px}
.wbtn,.tw-btn{background:none;border:none;color:var(--text2);padding:4px 9px;border-radius:4px;cursor:pointer;font-size:10.5px;font-weight:500;font-family:var(--font);transition:all .15s}
.wbtn:hover,.tw-btn:hover{color:var(--text)}
.wbtn.on,.tw-btn.on{background:var(--bg4);color:var(--blue)}

/* legacy small toggle button (kept for ta candle/line, ngf candle/line) */
.tbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:5px 10px;border-radius:5px;cursor:pointer;font-size:10.5px;font-family:var(--font);transition:all .15s;font-weight:500}
.tbtn:hover{border-color:var(--blue);color:var(--blue)}
.tbtn.on{background:rgba(68,147,248,.15);border-color:var(--blue);color:var(--blue)}

/* xbtn / zbtn — kept for compatibility but restyled */
.xbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text3);padding:5px 9px;border-radius:5px;cursor:pointer;font-size:10px;font-family:var(--mono);transition:all .15s;white-space:nowrap}
.xbtn:hover{border-color:var(--blue);color:var(--blue)}
.zbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text3);padding:5px 9px;border-radius:5px;cursor:pointer;font-size:10px;font-family:var(--mono);transition:all .15s;white-space:nowrap}
.zbtn:hover{border-color:var(--orange);color:var(--orange)}

/* ═══ Badges & status ═══ */
.api-ctr{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:3px 9px;font-size:10px;font-family:var(--mono)}
.api-lbl{color:var(--text3)}
.api-val{color:var(--blue);font-weight:600}
.cbadge{font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:4px;border:1px solid;white-space:nowrap}
.cbadge.live{background:rgba(63,185,80,.1);color:var(--green);border-color:rgba(63,185,80,.3)}
.cbadge.cached{background:rgba(68,147,248,.1);color:var(--blue);border-color:rgba(68,147,248,.3)}
.cbadge.loading{background:rgba(227,179,65,.1);color:var(--yellow);border-color:rgba(227,179,65,.3)}
.cbadge.err{background:rgba(255,123,114,.1);color:var(--red);border-color:rgba(255,123,114,.3)}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.sdot.ok{background:var(--green);animation:pulse 2s infinite}
.sdot.err{background:var(--red)}
.sdot.loading{background:var(--yellow);animation:pulse .6s infinite}

/* ═══ Tab views (sidebar nav switches these) ═══ */
.tab-panel{display:none;flex-direction:column}
.tab-panel.on{display:flex}

/* ═══ Control bar inside views ═══ */
.ctrl-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.tw-bar{display:flex;gap:2px;flex-wrap:wrap;align-items:center;background:var(--bg3);border-radius:6px;padding:2px}
.tw-lbl{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:0 8px 0 4px}
.smc-toggle{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text2);cursor:pointer;padding:4px 6px;user-select:none}
.smc-toggle input{margin:0;cursor:pointer;accent-color:var(--blue)}
.smc-toggle:hover{color:var(--text)}

/* dem-grid (used by storage/cot/weather) -> redesigned as metric cards inline */
.dem-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:12px}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;min-width:0}
.mbox-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;font-weight:600}
.mbox-val{font-size:14px;font-weight:700;font-family:var(--mono);line-height:1.2;color:var(--text);word-break:break-word}
.mbox-sub{font-size:9.5px;color:var(--text3);margin-top:3px;font-family:var(--mono);line-height:1.4}

/* block — older container, now mapped onto .panel-style */
.block{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.bhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.btitle{font-size:13px;font-weight:600;color:var(--text)}
.bsub{font-size:10.5px;color:var(--text3);margin-top:2px;font-family:var(--mono)}

/* Legend */
.legend{display:flex;gap:10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2)}
.ldr{width:16px;height:2.5px;border-radius:2px;flex-shrink:0}
.ldb{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.ldband{width:20px;height:8px;border-radius:2px;flex-shrink:0}

/* Chart wrap */
.cw{position:relative;width:100%}

/* Spinner */
.sp{display:inline-block;width:14px;height:14px;border:2px solid var(--bg4);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-right:6px;vertical-align:middle}
.spin-msg{text-align:center;padding:30px;color:var(--text2);font-size:12px}

/* ═══ TA grid ═══ */
.ta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:1400px){.ta-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.ta-grid{grid-template-columns:1fr}}
.ta-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px}

/* ═══ Futures contracts ═══ */
.fc-grid-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:4px}
.fc-card{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;min-width:0}
.fc-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.fc-price{font-size:15px;font-weight:700;font-family:var(--mono);color:var(--text)}
.fc-row{font-size:9px;margin-top:3px;font-family:var(--mono)}
.fc-badge{font-size:8px;padding:1px 5px;border-radius:3px;font-family:var(--mono);font-weight:600}
.fc-badge.front{background:rgba(68,147,248,.15);color:var(--blue);border:1px solid rgba(68,147,248,.3)}
.fc-badge.next{background:rgba(227,179,65,.1);color:var(--yellow);border:1px solid rgba(227,179,65,.25)}

/* ═══ COT popup ═══ */
.cot-help-btn{background:none;border:1px solid var(--border2);color:var(--text3);width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);transition:all .15s}
.cot-help-btn:hover{border-color:var(--blue);color:var(--blue)}
.cot-popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center;padding:20px}
.cot-popup-overlay.on{display:flex}
.cot-popup{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:22px 24px 20px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.cot-popup h3{font-size:15px;font-weight:600;margin-bottom:10px;color:var(--text)}
.cot-popup p{font-size:12.5px;line-height:1.7;color:var(--text2);margin-bottom:10px}
.cot-popup b{color:var(--text);font-weight:600}
.cot-popup .tag{display:inline-block;font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;margin-right:4px;margin-bottom:4px;font-weight:600}
.cot-popup .tag.bull{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.cot-popup .tag.bear{background:rgba(255,123,114,.15);color:var(--red);border:1px solid rgba(255,123,114,.3)}
.cot-popup .tag.neu{background:rgba(68,147,248,.15);color:var(--blue);border:1px solid rgba(68,147,248,.3)}
.cot-popup-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;line-height:1;padding:2px 8px;border-radius:4px}
.cot-popup-close:hover{color:var(--text);background:var(--bg3)}

/* ═══ Debug drawer (fixed bottom) ═══ */
.dbg-drawer{position:fixed;left:220px;right:0;bottom:0;background:var(--bg2);border-top:1px solid var(--border2);z-index:30;font-family:var(--mono);font-size:10.5px;transition:left .2s ease}
body.sidebar-collapsed .dbg-drawer{left:56px}
.dbg-bar{display:flex;align-items:center;gap:12px;padding:7px 16px;cursor:pointer;color:var(--text3)}
.dbg-bar:hover{background:var(--bg3)}
.dbg-bar .lbl{color:var(--text2);font-weight:600}
.dbg-sources{display:flex;gap:14px}
.dbg-sources span{display:flex;align-items:center;gap:5px}
.dbg-sources .d{width:6px;height:6px;border-radius:50%}
.dbg-toggle{margin-left:auto;color:var(--text2);font-weight:600;font-size:10px;display:flex;align-items:center;gap:8px}
#dbg-body{display:none;border-top:1px solid var(--border2);background:var(--bg)}
#dbg-log{font-family:var(--mono);font-size:11px;line-height:1.7;padding:10px 14px;max-height:220px;overflow-y:auto;background:var(--bg)}
#dbg-count,#dbg-dot{display:inline-flex;align-items:center}
#dbg-clear-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text3);padding:3px 9px;border-radius:4px;cursor:pointer;font-size:10px;font-family:var(--mono)}
#dbg-clear-btn:hover{border-color:var(--red);color:var(--red)}

@media(max-width:1024px){.dbg-drawer{left:0}.app{grid-template-columns:1fr}.sidebar{display:none}}
/* ═══════════════════════════════════════════════════════════════════════════
   MOBILE RESPONSIVE — breakpoint 768px
   ═══════════════════════════════════════════════════════════════════════════ */
@media(max-width:768px){
  /* ── Layout ── */
  .app{display:block;min-height:100vh;padding-bottom:64px}
  .sidebar{display:none}
  .main{padding:0 10px 10px}

  /* ── Mobile topbar ── */
  .topbar{height:56px;padding:0 12px;gap:6px;overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;position:fixed;top:0;left:0;right:0;z-index:100}
  .topbar::-webkit-scrollbar{display:none}
  .brand-name{display:none}
  .brand svg{width:24px;height:24px}
  .topbar-actions{gap:6px;flex-shrink:0}
  .price-card{min-width:140px;padding:5px 8px}
  .price-card-val{font-size:16px}
  .price-card-chg{font-size:10px}
  .season-card{padding:5px 7px}
  .kpi-strip{gap:4px}

  /* ── Hamburger button ── */
  .mob-hamburger{display:flex;align-items:center;justify-content:center;
    width:36px;height:36px;border:1px solid var(--border2);border-radius:8px;
    background:var(--bg3);color:var(--text2);font-size:18px;cursor:pointer;
    flex-shrink:0;align-self:center}

  /* ── Mobile drawer (sidebar) ── */
  .mob-drawer{position:fixed;top:0;left:0;bottom:0;width:240px;z-index:200;
    background:var(--bg2);border-right:1px solid var(--border2);
    transform:translateX(-100%);transition:transform .25s ease;
    display:flex;flex-direction:column;overflow-y:auto;padding:16px 10px}
  .mob-drawer.open{transform:translateX(0)}
  .mob-drawer-overlay{position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.5);
    display:none}
  .mob-drawer-overlay.open{display:block}
  .mob-drawer-close{align-self:flex-end;background:none;border:1px solid var(--border2);
    border-radius:6px;color:var(--text2);padding:4px 10px;font-size:13px;cursor:pointer;
    margin-bottom:12px}

  /* ── Bottom navigation ── */
  .mob-bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:64px;
    background:var(--bg2);border-top:1px solid var(--border2);z-index:100;
    padding:0 4px;padding-bottom:env(safe-area-inset-bottom)}
  .mob-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;background:none;border:none;
    color:var(--text3);font-size:9px;font-weight:600;letter-spacing:.5px;
    text-transform:uppercase;cursor:pointer;font-family:var(--font);transition:color .15s}
  .mob-nav-btn.active{color:var(--blue)}
  .mob-nav-ico{font-size:20px;line-height:1}

  /* ── Mobile pages ── */
  .mob-page{display:none;padding-top:70px}
  .mob-page.active{display:block}

  /* ── Desktop-only elements ── */
  .master-grid,.right-stack,.right-col,.always-on-strip,.always-on-widgets{display:none!important}

  /* ── Mobile Overview ── */
  .mob-overview-section{background:var(--bg2);border:1px solid var(--border2);
    border-radius:10px;padding:12px 14px;margin-bottom:10px}
  .mob-section-title{font-size:9px;text-transform:uppercase;letter-spacing:1px;
    color:var(--text3);font-weight:700;margin-bottom:8px}
  .mob-sentiment-big{font-size:28px;font-weight:700;margin-bottom:2px}
  .mob-sentiment-score{font-size:12px;color:var(--text3);font-family:var(--mono)}
  .mob-signals-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .mob-signal-row{display:flex;flex-direction:column;gap:2px;padding:6px 8px;
    background:var(--bg3);border-radius:6px}
  .mob-signal-name{font-size:9px;color:var(--text3);font-weight:600}
  .mob-signal-val{font-size:11px;font-weight:700}
  .mob-fp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .mob-fp-cell{background:var(--bg3);border-radius:6px;padding:8px}
  .mob-fp-label{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .mob-fp-fair{font-size:15px;font-weight:700;font-family:var(--mono);color:#4493f8}
  .mob-fp-status{font-size:10px;font-weight:700}
  .mob-countdown-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .mob-countdown-item{background:var(--bg3);border-radius:6px;padding:8px;
    border-left:3px solid var(--border2)}
  .mob-countdown-label{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .mob-countdown-date{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--text)}
  .mob-countdown-eta{font-size:10px;font-family:var(--mono);color:var(--text3)}
  .mob-storage-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .mob-storage-val{font-size:22px;font-weight:700;font-family:var(--mono)}
  .mob-storage-unit{font-size:11px;color:var(--text3)}

  /* ── Mobile Charts ── */
  .mob-ta-tabs{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;
    scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .mob-ta-tabs::-webkit-scrollbar{display:none}
  .mob-ta-tab{flex-shrink:0;padding:6px 14px;border-radius:6px;border:1px solid var(--border2);
    background:var(--bg3);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;
    font-family:var(--mono);transition:all .15s}
  .mob-ta-tab.active{background:var(--blue);border-color:var(--blue);color:#fff}
