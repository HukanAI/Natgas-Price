<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NG=F · Natural Gas Futures</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#app{height:100%;background:#0d1117;color:#e8eaf0;font-family:system-ui,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column}

#header{padding:12px 20px;border-bottom:1px solid #1e2530;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.badge{font-size:11px;color:#5a6478;background:#151b26;padding:2px 8px;border-radius:4px;border:1px solid #1e2530}
#ticker-sym{font-size:22px;font-weight:700;font-family:monospace;color:#e8eaf0}
#price{font-size:32px;font-weight:700;font-family:monospace;letter-spacing:-0.5px;color:#e8eaf0}
#change,#changePct{font-family:monospace;font-weight:600}
#change{font-size:15px}#changePct{font-size:12px}
.stat{text-align:right}.stat-l{font-size:10px;color:#3d4a5c;text-transform:uppercase;letter-spacing:1px}
.stat-v{font-size:13px;color:#8492a6;font-family:monospace;margin-top:2px}

#controls{padding:8px 20px;border-bottom:1px solid #1e2530;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tf{padding:4px 14px;font-size:12px;font-family:monospace;border-radius:4px;border:1px solid #1e2530;cursor:pointer;background:transparent;color:#5a6478;transition:all .15s}
.tf.on{background:#1a6ed8;color:#fff;border-color:#1a6ed8}
#rbtn{background:transparent;border:1px solid #1e2530;color:#5a6478;border-radius:4px;padding:2px 9px;cursor:pointer;font-size:14px}
#dot{width:7px;height:7px;border-radius:50%;background:#26c281;margin-left:auto;flex-shrink:0}
#status{font-size:11px;color:#3d4a5c;font-family:monospace}

#tbar{padding:5px 20px;border-bottom:1px solid #1e2530;display:flex;gap:14px;align-items:center;min-height:30px}
.oi{display:none;gap:5px;align-items:baseline}
.ol{font-size:11px;color:#3d4a5c;font-family:monospace}
.ov{font-size:13px;font-weight:600;font-family:monospace}
#hint{font-size:11px;color:#3d4a5c;font-family:monospace}

#cwrap{flex:1;position:relative;min-height:0}
#cv{width:100%;height:100%}

#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#0d1117;z-index:10}
#spin{width:36px;height:36px;border:3px solid #1e2530;border-top:3px solid #1a6ed8;border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ebox{background:#110d10;border:1px solid #5c1a1a;border-radius:10px;padding:24px 32px;text-align:center;max-width:420px}
.etit{color:#e74c3c;font-size:15px;margin-bottom:8px}
.emsg{color:#5a6478;font-size:11px;font-family:monospace;margin-bottom:16px;word-break:break-word;line-height:1.5}
.rbtn2{padding:6px 20px;background:transparent;border:1px solid #1a6ed8;border-radius:4px;color:#1a6ed8;cursor:pointer;font-size:13px}

#footer{padding:5px 20px;border-top:1px solid #1e2530;display:flex;justify-content:space-between;font-size:10px;color:#2a3548;font-family:monospace;flex-wrap:wrap;gap:4px}
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span id="ticker-sym">NG=F</span>
      <span class="badge">Natural Gas Futures · NYMEX</span>
      <span class="badge" style="color:#3d4a5c;border-color:transparent;background:transparent">USD/MMBtu</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:10px">
      <span id="price">—</span>
      <div><div id="change">—</div><div id="changePct"></div></div>
    </div>
    <div style="display:flex;gap:20px;margin-left:auto;flex-wrap:wrap">
      <div class="stat"><div class="stat-l">Volume</div><div class="stat-v" id="vol">—</div></div>
      <div class="stat"><div class="stat-l">Updated</div><div class="stat-v" id="upd">—</div></div>
    </div>
  </div>

  <div id="controls">
    <button class="tf" data-r="1mo" data-i="1d">1M</button>
    <button class="tf" data-r="3mo" data-i="1d">3M</button>
    <button class="tf on" data-r="ytd" data-i="1d">YTD</button>
    <button class="tf" data-r="1y"  data-i="1d">1Y</button>
    <button class="tf" data-r="2y"  data-i="1wk">2Y</button>
    <button id="rbtn" title="Obnovit nyní">↻</button>
    <div id="dot"></div>
    <span id="status">Auto-refresh 60s</span>
  </div>

  <div id="tbar">
    <span id="hint">Přejeďte myší přes graf pro OHLC hodnoty</span>
    <div class="oi" id="oi-o"><span class="ol">O</span><span class="ov" id="tv-o"></span></div>
    <div class="oi" id="oi-h"><span class="ol">H</span><span class="ov" id="tv-h" style="color:#26c281"></span></div>
    <div class="oi" id="oi-l"><span class="ol">L</span><span class="ov" id="tv-l" style="color:#e74c3c"></span></div>
    <div class="oi" id="oi-c"><span class="ol">C</span><span class="ov" id="tv-c"></span></div>
  </div>

  <div id="cwrap">
    <div id="cv"></div>
    <div id="overlay">
      <div id="spin"></div>
      <span style="color:#3d4a5c;font-size:14px;font-family:monospace">Načítám knihovnu…</span>
    </div>
  </div>

  <div id="footer">
    <span>NG=F · NYMEX · USD/MMBtu · Zdroj: Yahoo Finance</span>
    <span>Scroll = zoom · Táhni = posuv · Dvojklik osy X = fit all</span>
  </div>
</div>

<script>
'use strict';

// ─── Config ──────────────────────────────────────────────────────────────────
const TICKER = 'NG=F';
const REFRESH_MS = 60000;

// Multiple proxy fallbacks — tried in order until one works
const PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://proxy.cors.sh/${url}`,
];

// Yahoo Finance base URL (try query2 first, fallback to query1)
const YF_HOSTS = ['query2.finance.yahoo.com', 'query1.finance.yahoo.com'];

// ─── State ────────────────────────────────────────────────────────────────────
let chart, candleSeries, volSeries;
let curRange = 'ytd', curInterval = '1d';
let timer;

// ─── Wait for LightweightCharts to load ──────────────────────────────────────
function waitForLib(cb) {
  if (typeof LightweightCharts !== 'undefined') { cb(); return; }
  let tries = 0;
  const id = setInterval(() => {
    if (typeof LightweightCharts !== 'undefined') { clearInterval(id); cb(); return; }
    if (++tries > 60) { clearInterval(id); showErr('Nepodařilo se načíst charting knihovnu. Zkontroluj připojení.'); }
  }, 100);
}

// ─── Init chart ───────────────────────────────────────────────────────────────
function initChart() {
  const wrap = document.getElementById('cwrap');
  chart = LightweightCharts.createChart(document.getElementById('cv'), {
    layout:{ background:{type:'solid',color:'#0d1117'}, textColor:'#5a6478', fontFamily:'monospace', fontSize:11 },
    grid:{ vertLines:{color:'#131a24'}, horzLines:{color:'#131a24'} },
    crosshair:{ mode:LightweightCharts.CrosshairMode.Normal,
      vertLine:{color:'#334155',labelBackgroundColor:'#1e2d3d'},
      horzLine:{color:'#334155',labelBackgroundColor:'#1e2d3d'} },
    rightPriceScale:{ borderColor:'#1e2530', scaleMargins:{top:0.06,bottom:0.26} },
    timeScale:{ borderColor:'#1e2530', timeVisible:true, secondsVisible:false,
      rightOffset:5, barSpacing:8, minBarSpacing:2 },
    handleScroll:{mouseWheel:true,pressedMouseMove:true,horzTouchDrag:true},
    handleScale:{mouseWheel:true,pinch:true,axisPressedMouseMove:true},
    width: wrap.clientWidth,
    height: wrap.clientHeight,
  });

  candleSeries = chart.addCandlestickSeries({
    upColor:'#26c281', downColor:'#e74c3c',
    borderUpColor:'#26c281', borderDownColor:'#e74c3c',
    wickUpColor:'#26c281', wickDownColor:'#e74c3c',
    priceFormat:{type:'price',precision:3,minMove:0.001},
  });

  volSeries = chart.addHistogramSeries({
    priceFormat:{type:'volume'}, priceScaleId:'vol',
  });
  chart.priceScale('vol').applyOptions({ scaleMargins:{top:0.80,bottom:0} });

  // Crosshair OHLC tooltip
  chart.subscribeCrosshairMove(p => {
    if (!p.time || !p.seriesData) { clearTooltip(); return; }
    const b = p.seriesData.get(candleSeries);
    if (!b) { clearTooltip(); return; }
    document.getElementById('hint').style.display = 'none';
    const up = b.close >= b.open;
    setOI('o', b.open?.toFixed(3), '#8492a6');
    setOI('h', b.high?.toFixed(3), '#26c281');
    setOI('l', b.low?.toFixed(3),  '#e74c3c');
    setOI('c', b.close?.toFixed(3), up ? '#26c281' : '#e74c3c');
  });

  // Resize observer
  new ResizeObserver(([e]) => {
    const {width, height} = e.contentRect;
    if (width > 0 && height > 0) chart.applyOptions({width, height});
  }).observe(wrap);
}

function clearTooltip() {
  document.getElementById('hint').style.display = '';
  ['o','h','l','c'].forEach(k => { document.getElementById('oi-'+k).style.display='none'; });
}
function setOI(k, v, color) {
  const el = document.getElementById('oi-'+k);
  el.style.display = 'flex';
  const vEl = document.getElementById('tv-'+k);
  vEl.textContent = v; vEl.style.color = color;
}

// ─── Fetch with proxy fallback ─────────────────────────────────────────────
async function fetchWithFallback(yfUrl) {
  const errors = [];
  for (const makeProxy of PROXIES) {
    const proxyUrl = makeProxy(yfUrl);
    try {
      const res = await fetch(proxyUrl, {
        headers: { 'Accept': 'application/json' },
        signal: AbortSignal.timeout(10000),
      });
      if (!res.ok) { errors.push(`${proxyUrl.split('/')[2]}: HTTP ${res.status}`); continue; }
      const text = await res.text();
      if (!text || text.trim() === '') { errors.push(`${proxyUrl.split('/')[2]}: prázdná odpověď`); continue; }
      const json = JSON.parse(text);
      return json;
    } catch(e) {
      errors.push(`${proxyUrl.split('/')[2]}: ${e.message}`);
    }
  }
  throw new Error('Všechny proxy selhaly:\n' + errors.join('\n'));
}

// ─── Build Yahoo Finance URL ──────────────────────────────────────────────
function buildYFUrl(host) {
  return `https://${host}/v8/finance/chart/${encodeURIComponent(TICKER)}` +
    `?range=${curRange}&interval=${curInterval}&includePrePost=false&events=div%7Csplit`;
}

// ─── Parse Yahoo Finance response ────────────────────────────────────────
function parseYF(json) {
  const res = json?.chart?.result?.[0];
  if (!res) {
    const errMsg = json?.chart?.error?.description || 'Žádná data od Yahoo Finance';
    throw new Error(errMsg);
  }
  const ts   = res.timestamp || [];
  const q    = res.indicators?.quote?.[0] || {};
  const meta = res.meta || {};

  if (ts.length === 0) throw new Error('Yahoo Finance vrátil prázdná data pro toto období');

  const candles = ts.map((t, i) => ({
    time:   Math.floor(t),
    open:   q.open?.[i],
    high:   q.high?.[i],
    low:    q.low?.[i],
    close:  q.close?.[i],
    volume: q.volume?.[i] ?? 0,
  })).filter(c => c.open != null && c.high != null && c.low != null && c.close != null)
     .sort((a, b) => a.time - b.time);

  if (candles.length === 0) throw new Error('Žádné platné OHLC záznamy po filtrování');

  return {
    candles,
    price:     meta.regularMarketPrice     ?? candles[candles.length-1].close,
    prevClose: meta.chartPreviousClose     ?? candles[candles.length-2]?.close,
    volume:    meta.regularMarketVolume    ?? candles[candles.length-1].volume,
  };
}

// ─── Load data ────────────────────────────────────────────────────────────
async function loadData(isRefresh = false) {
  setRefreshing(true);
  if (!isRefresh) showLoading();

  let lastErr = null;
  for (const host of YF_HOSTS) {
    try {
      const json = await fetchWithFallback(buildYFUrl(host));
      const { candles, price, prevClose, volume } = parseYF(json);

      // Push data to chart
      candleSeries.setData(candles);
      volSeries.setData(candles.map(c => ({
        time: c.time,
        value: c.volume,
        color: c.close >= c.open ? '#1a3d2b' : '#3d1a1a',
      })));
      chart.timeScale().fitContent();

      // Update header
      const ch = prevClose != null ? price - prevClose : null;
      const pct = ch != null && prevClose ? (ch / prevClose * 100) : null;
      const up = ch >= 0;
      const sign = up ? '+' : '';
      const clr = up ? '#26c281' : '#e74c3c';
      setText('price', price.toFixed(3));
      const chEl = document.getElementById('change');
      chEl.textContent = ch != null ? sign + ch.toFixed(3) : '—';
      chEl.style.color = clr;
      const pctEl = document.getElementById('changePct');
      pctEl.textContent = pct != null ? `(${sign}${pct.toFixed(2)}%)` : '';
      pctEl.style.color = clr;
      setText('vol', volume ? Number(volume).toLocaleString('cs-CZ') : '—');
      setText('upd', new Date().toLocaleTimeString('cs-CZ'));

      hideOverlay();
      setRefreshing(false);
      return; // success
    } catch(e) {
      lastErr = e;
      console.warn('Host', host, 'failed:', e.message);
    }
  }

  // All attempts failed
  setRefreshing(false);
  if (!isRefresh) showErr(lastErr?.message || 'Neznámá chyba');
  else console.error('Refresh selhal:', lastErr);
}

// ─── UI helpers ──────────────────────────────────────────────────────────
function setText(id, v) { document.getElementById(id).textContent = v; }

function showLoading() {
  const o = document.getElementById('overlay');
  o.style.display = 'flex';
  o.innerHTML = `<div id="spin"></div>
    <span style="color:#3d4a5c;font-size:14px;font-family:monospace">Načítám data z Yahoo Finance…</span>`;
}

function showErr(msg) {
  const o = document.getElementById('overlay');
  o.style.display = 'flex';
  o.innerHTML = `<div class="ebox">
    <p class="etit">⚠ Chyba při načítání dat</p>
    <p class="emsg">${msg.replace(/\n/g,'<br>')}</p>
    <button class="rbtn2" onclick="loadData()">Zkusit znovu</button>
  </div>`;
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

function setRefreshing(on) {
  document.getElementById('dot').style.background = on ? '#e7a22b' : '#26c281';
  document.getElementById('status').textContent = on ? 'Načítám…' : 'Auto-refresh 60s';
}

// ─── Controls ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tf').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    curRange    = btn.dataset.r;
    curInterval = btn.dataset.i;
    clearTooltip();
    loadData();
  });
});
document.getElementById('rbtn').addEventListener('click', () => loadData(true));

// ─── Boot ────────────────────────────────────────────────────────────────
waitForLib(() => {
  initChart();
  loadData();
  timer = setInterval(() => loadData(true), REFRESH_MS);
});
</script>
</body>
</html>
