<script>
'use strict';

// ─── Constants ────────────────────────────────────────────────────────────────
const TICKER      = 'NG=F';
const TZ          = 'Europe/Prague';
const REFRESH_MS  = 10000;
const SWING_STR   = 10; // pivot strength (bars each side)

const FETCH_CFG = {
  '1m':  { range: '5d',  interval: '1m',  resample: 1 },
  '5m':  { range: '1mo', interval: '5m',  resample: 1 },
  '15m': { range: '1mo', interval: '15m', resample: 1 },
  '1h':  { range: '1y',  interval: '1h',  resample: 1 },
  '4h':  { range: '1y',  interval: '1h',  resample: 4 },
  '1d':  { range: '5y',  interval: '1d',  resample: 1 },
  '1wk': { range: '10y', interval: '1wk', resample: 1 },
};

const PROXIES = [
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://proxy.cors.sh/${u}`,
];
const YF_HOSTS = ['query2.finance.yahoo.com', 'query1.finance.yahoo.com'];

// ─── App state ────────────────────────────────────────────────────────────────
let curIv        = '1h';
let refreshTimer = null;
let isSyncing    = false;

// Chart instances (set in initCharts)
let chartMain, chartRsi, chartMacd;

// Main chart series
let serCandle, serVol, serEma50, serEma200, serEma500;
// Zone series (premium / discount)
let serZoneHigh, serZoneEquil, serZoneLow, serPremiumArea, serDiscountArea;
// RSI series
let serRsi, serRsiOB, serRsiOS, serRsiMid;
// MACD series
let serMacdLine, serMacdSignal, serMacdHist;

// ─── Prague time ──────────────────────────────────────────────────────────────
function pragueNow() {
  return new Date().toLocaleTimeString('cs-CZ', {
    timeZone: TZ, hour: '2-digit', minute: '2-digit', second: '2-digit',
  });
}
function pragueOffsetSec(ts) {
  const d = new Date(ts * 1000);
  const mins = tz => {
    const [, t] = d.toLocaleString('en-GB', { timeZone: tz }).split(', ');
    const [h, m] = t.split(':');
    return +h * 60 + +m;
  };
  let diff = mins(TZ) - mins('UTC');
  if (diff >  720) diff -= 1440;
  if (diff < -720) diff += 1440;
  return diff * 60;
}
function shiftTs(ts) { return ts + pragueOffsetSec(ts); }
function todayStr()  { return new Date().toLocaleDateString('en-CA', { timeZone: TZ }); }
function dateStr(ts) { return new Date(ts * 1000).toLocaleDateString('en-CA', { timeZone: TZ }); }

function getPrevDayClose(candles, fallback) {
  const today = todayStr();
  for (let i = candles.length - 1; i >= 0; i--) {
    if (dateStr(candles[i].time) < today) return candles[i].close;
  }
  return fallback;
}

setInterval(() => { g('prg-time').textContent = pragueNow(); }, 1000);
g('prg-time').textContent = pragueNow();

// ─── Resample ─────────────────────────────────────────────────────────────────
function resample(candles, n) {
  if (n <= 1) return candles;
  const sec = n * 3600;
  const map = new Map();
  for (const c of candles) {
    const key = Math.floor(c.time / sec) * sec;
    if (!map.has(key)) {
      map.set(key, { time: key, open: c.open, high: c.high, low: c.low, close: c.close, volume: c.volume });
    } else {
      const b = map.get(key);
      if (c.high > b.high) b.high = c.high;
      if (c.low  < b.low)  b.low  = c.low;
      b.close   = c.close;
      b.volume += c.volume;
    }
  }
  return [...map.values()].sort((a, b) => a.time - b.time);
}

// ─── Indicators ───────────────────────────────────────────────────────────────
function calcEMA(closes, period) {
  const out = new Array(closes.length).fill(null);
  if (closes.length < period) return out;
  let sum = 0;
  for (let i = 0; i < period; i++) sum += closes[i];
  let ema = sum / period;
  out[period - 1] = ema;
  const k = 2 / (period + 1);
  for (let i = period; i < closes.length; i++) {
    ema    = closes[i] * k + ema * (1 - k);
    out[i] = ema;
  }
  return out;
}

function calcRSI(closes, period) {
  const out = new Array(closes.length).fill(null);
  if (closes.length < period + 1) return out;
  let avgG = 0, avgL = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) avgG += d; else avgL -= d;
  }
  avgG /= period; avgL /= period;
  out[period] = avgL === 0 ? 100 : +(100 - 100 / (1 + avgG / avgL)).toFixed(2);
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    avgG = (avgG * (period - 1) + (d > 0 ? d : 0)) / period;
    avgL = (avgL * (period - 1) + (d < 0 ? -d : 0)) / period;
    out[i] = avgL === 0 ? 100 : +(100 - 100 / (1 + avgG / avgL)).toFixed(2);
  }
  return out;
}

function calcMACD(closes, fast, slow, signal) {
  const eFast = calcEMA(closes, fast);
  const eSlow = calcEMA(closes, slow);
  const macd  = closes.map((_, i) =>
    eFast[i] != null && eSlow[i] != null ? eFast[i] - eSlow[i] : null
  );
  // Compute EMA of macd (skipping nulls, re-aligning)
  const macdVals = macd.filter(v => v != null);
  const sigEma   = calcEMA(macdVals, signal);
  const sig      = new Array(closes.length).fill(null);
  let si = 0;
  for (let i = 0; i < closes.length; i++) {
    if (macd[i] != null) { sig[i] = sigEma[si] ?? null; si++; }
  }
  const hist = closes.map((_, i) =>
    macd[i] != null && sig[i] != null ? macd[i] - sig[i] : null
  );
  return { macd, sig, hist };
}

// ─── SMC swing pivot detection ────────────────────────────────────────────────
function findSwings(candles, strength) {
  let high = null, low = null;
  const end = candles.length - 1 - strength;
  for (let i = end; i >= strength; i--) {
    if (!high) {
      let ok = true;
      for (let j = i - strength; j <= i + strength; j++) {
        if (j !== i && candles[j].high >= candles[i].high) { ok = false; break; }
      }
      if (ok) high = candles[i].high;
    }
    if (!low) {
      let ok = true;
      for (let j = i - strength; j <= i + strength; j++) {
        if (j !== i && candles[j].low <= candles[i].low) { ok = false; break; }
      }
      if (ok) low = candles[i].low;
    }
    if (high && low) break;
  }
  return { high, low };
}

// ─── Chart init ───────────────────────────────────────────────────────────────
function buildChartOpts(extra) {
  // Called only inside initCharts(), so LightweightCharts is guaranteed loaded
  return {
    layout:       { background: { type: 'solid', color: '#0d1117' }, textColor: '#5a6478', fontFamily: 'monospace', fontSize: 11 },
    grid:         { vertLines: { color: '#131a24' }, horzLines: { color: '#131a24' } },
    crosshair:    { mode: LightweightCharts.CrosshairMode.Normal, vertLine: { color: '#334155', labelBackgroundColor: '#1e2d3d' }, horzLine: { color: '#334155', labelBackgroundColor: '#1e2d3d' } },
    handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: false },
    handleScale:  { mouseWheel: true, pinch: true, axisPressedMouseMove: true },
    ...extra,
  };
}

function createChart(elId, extra) {
  const el = g(elId);
  return LightweightCharts.createChart(el, {
    ...buildChartOpts(extra),
    width:  el.clientWidth,
    height: el.clientHeight,
  });
}

function initCharts() {
  // ── Main chart ──────────────────────────────────────────────────────────────
  chartMain = createChart('pane-main', {
    rightPriceScale: { borderColor: '#1e2530', scaleMargins: { top: 0.06, bottom: 0.22 } },
    timeScale: { borderColor: '#1e2530', timeVisible: true, secondsVisible: false, rightOffset: 5, barSpacing: 8, minBarSpacing: 2 },
  });

  serCandle = chartMain.addCandlestickSeries({
    upColor: '#26c281', downColor: '#e74c3c',
    borderUpColor: '#26c281', borderDownColor: '#e74c3c',
    wickUpColor: '#26c281', wickDownColor: '#e74c3c',
    priceFormat: { type: 'price', precision: 3, minMove: 0.001 },
  });

  serVol = chartMain.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
  });
  chartMain.priceScale('vol').applyOptions({ scaleMargins: { top: 0.80, bottom: 0 }, borderColor: '#1e2530' });

  const emaOpts = { priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false, priceFormat: { type: 'price', precision: 3, minMove: 0.001 } };
  serEma50  = chartMain.addLineSeries({ ...emaOpts, color: '#f0c040', lineWidth: 1.5 });
  serEma200 = chartMain.addLineSeries({ ...emaOpts, color: '#e74c3c', lineWidth: 1.5 });
  serEma500 = chartMain.addLineSeries({ ...emaOpts, color: '#2196f3', lineWidth: 1.5 });

  // Zone series — order matters for z-index (added after candles so they render on top)
  const zOpts = { priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false };

  serPremiumArea = chartMain.addAreaSeries({
    ...zOpts,
    topColor:    'rgba(231,76,60,0.18)',
    bottomColor: 'rgba(231,76,60,0.03)',
    lineColor:   'rgba(231,76,60,0)',
    lineWidth:   0,
  });

  serDiscountArea = chartMain.addAreaSeries({
    ...zOpts,
    topColor:    'rgba(38,194,129,0.03)',
    bottomColor: 'rgba(38,194,129,0.18)',
    lineColor:   'rgba(38,194,129,0)',
    lineWidth:   0,
  });

  serZoneHigh  = chartMain.addLineSeries({ ...zOpts, color: 'rgba(231,76,60,0.8)',   lineWidth: 1 });
  serZoneEquil = chartMain.addLineSeries({ ...zOpts, color: 'rgba(240,192,64,0.6)',  lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed });
  serZoneLow   = chartMain.addLineSeries({ ...zOpts, color: 'rgba(38,194,129,0.8)', lineWidth: 1 });

  // Crosshair
  chartMain.subscribeCrosshairMove(onMainCrosshair);

  // ── RSI chart ───────────────────────────────────────────────────────────────
  chartRsi = createChart('pane-rsi', {
    rightPriceScale: { borderColor: '#1e2530', scaleMargins: { top: 0.08, bottom: 0.08 } },
    timeScale: { borderColor: '#1e2530', timeVisible: false },
  });

  serRsi = chartRsi.addLineSeries({
    color: '#a78bfa', lineWidth: 1.5,
    priceLineVisible: false, lastValueVisible: true, crosshairMarkerVisible: true,
    crosshairMarkerRadius: 3,
    priceFormat: { type: 'custom', formatter: v => v.toFixed(1) },
  });

  const refOpts = { priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false };
  serRsiOB  = chartRsi.addLineSeries({ ...refOpts, color: 'rgba(231,76,60,0.4)',   lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed });
  serRsiOS  = chartRsi.addLineSeries({ ...refOpts, color: 'rgba(38,194,129,0.4)', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed });
  serRsiMid = chartRsi.addLineSeries({ ...refOpts, color: 'rgba(100,120,150,0.4)',lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted });

  chartRsi.subscribeCrosshairMove(p => {
    syncCrosshair(p, chartRsi);
    const s = p?.seriesData?.get(serRsi);
    if (s) { g('ev-rsi').textContent = s.value.toFixed(1); g('ev-rsi').style.color = rsiColor(s.value); }
  });

  // ── MACD chart ──────────────────────────────────────────────────────────────
  chartMacd = createChart('pane-macd', {
    rightPriceScale: { borderColor: '#1e2530', scaleMargins: { top: 0.08, bottom: 0.08 } },
    timeScale: { borderColor: '#1e2530', timeVisible: true, secondsVisible: false },
  });

  serMacdLine   = chartMacd.addLineSeries({ color: '#26c281', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false, priceFormat: { type: 'price', precision: 4, minMove: 0.0001 } });
  serMacdSignal = chartMacd.addLineSeries({ color: '#f0c040', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false, priceFormat: { type: 'price', precision: 4, minMove: 0.0001 } });
  serMacdHist   = chartMacd.addHistogramSeries({ priceFormat: { type: 'price', precision: 4, minMove: 0.0001 } });

  chartMacd.subscribeCrosshairMove(p => {
    syncCrosshair(p, chartMacd);
    const ml = p?.seriesData?.get(serMacdLine);
    const ms = p?.seriesData?.get(serMacdSignal);
    const mh = p?.seriesData?.get(serMacdHist);
    if (ml) g('ev-macd').textContent = ml.value.toFixed(4);
    if (ms) g('ev-sig').textContent  = ms.value.toFixed(4);
    if (mh) { g('ev-hist').textContent = mh.value.toFixed(4); g('ev-hist').style.color = mh.value >= 0 ? '#26c281' : '#e74c3c'; }
  });

  // ── Sync time scales ────────────────────────────────────────────────────────
  const allCharts = [chartMain, chartRsi, chartMacd];
  allCharts.forEach(src => {
    src.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (!range || isSyncing) return;
      isSyncing = true;
      allCharts.forEach(dst => { if (dst !== src) dst.timeScale().setVisibleLogicalRange(range); });
      isSyncing = false;
    });
  });

  // ── Resize observer ─────────────────────────────────────────────────────────
  new ResizeObserver(() => {
    const resize = (ch, id) => {
      const el = g(id);
      const w = el.clientWidth, h = el.clientHeight;
      if (w > 0 && h > 0) ch.applyOptions({ width: w, height: h });
    };
    resize(chartMain, 'pane-main');
    resize(chartRsi,  'pane-rsi');
    resize(chartMacd, 'pane-macd');
  }).observe(g('cwrap'));
}

// ─── Crosshair helpers ────────────────────────────────────────────────────────
function syncCrosshair(param, sourceChart) {
  if (isSyncing) return;
  isSyncing = true;
  [chartMain, chartRsi, chartMacd].forEach(ch => {
    if (ch === sourceChart) return;
    if (param?.point) {
      // Find the first series on this chart to pass as reference
      try { ch.setCrosshairPosition(param.price ?? 0, param.time, null); } catch (_) {}
    } else {
      try { ch.clearCrosshairPosition(); } catch (_) {}
    }
  });
  isSyncing = false;
}

function onMainCrosshair(p) {
  syncCrosshair(p, chartMain);
  if (!p?.seriesData) { clearTip(); return; }
  const b = p.seriesData.get(serCandle);
  if (!b) { clearTip(); return; }
  g('hint').style.display = 'none';
  setOI('o', b.open?.toFixed(3),  '#8492a6');
  setOI('h', b.high?.toFixed(3),  '#26c281');
  setOI('l', b.low?.toFixed(3),   '#e74c3c');
  setOI('c', b.close?.toFixed(3), b.close >= b.open ? '#26c281' : '#e74c3c');
  const e50  = p.seriesData.get(serEma50);
  const e200 = p.seriesData.get(serEma200);
  const e500 = p.seriesData.get(serEma500);
  if (e50)  g('ev50').textContent  = e50.value.toFixed(3);
  if (e200) g('ev200').textContent = e200.value.toFixed(3);
  if (e500) g('ev500').textContent = e500.value.toFixed(3);
}

function rsiColor(v) {
  return v >= 70 ? '#e74c3c' : v <= 30 ? '#26c281' : '#a78bfa';
}

// ─── Autofit ──────────────────────────────────────────────────────────────────
function fitAll() {
  if (!chartMain) return;
  chartMain.timeScale().fitContent();
  chartMain.priceScale('right').applyOptions({ autoScale: true });
}

// ─── Fetch helpers ────────────────────────────────────────────────────────────
async function fetchWithFallback(url) {
  const errs = [];
  for (const mkP of PROXIES) {
    try {
      const res = await fetch(mkP(url), {
        headers: { Accept: 'application/json' },
        signal:  AbortSignal.timeout(12000),
      });
      if (!res.ok) { errs.push(`HTTP ${res.status}`); continue; }
      const txt = await res.text();
      if (!txt?.trim()) { errs.push('empty response'); continue; }
      return JSON.parse(txt);
    } catch (e) { errs.push(e.message); }
  }
  throw new Error('All proxies failed: ' + errs.join(' | '));
}

function buildUrl(host, cfg) {
  return `https://${host}/v8/finance/chart/${encodeURIComponent(TICKER)}` +
    `?range=${cfg.range}&interval=${cfg.interval}&includePrePost=false&events=div%7Csplit`;
}

async function fetchYF(cfg) {
  let last;
  for (const host of YF_HOSTS) {
    try { return await fetchWithFallback(buildUrl(host, cfg)); }
    catch (e) { last = e; }
  }
  throw last;
}

function parseYF(json) {
  const r = json?.chart?.result?.[0];
  if (!r) throw new Error('Yahoo Finance: ' + (json?.chart?.error?.description || 'no data'));
  const ts = r.timestamp || [], q = r.indicators?.quote?.[0] || {}, m = r.meta || {};
  if (!ts.length) throw new Error('Yahoo Finance returned empty data');

  const candles = ts
    .map((t, i) => ({
      time:   Math.floor(t),
      open:   q.open?.[i],
      high:   q.high?.[i],
      low:    q.low?.[i],
      close:  q.close?.[i],
      volume: q.volume?.[i] ?? 0,
    }))
    .filter(c => c.open != null && c.high != null && c.low != null && c.close != null)
    .sort((a, b) => a.time - b.time);

  if (!candles.length) throw new Error('No valid candles after filtering');
  const last = candles[candles.length - 1];
  return {
    candles,
    price:       m.regularMarketPrice   ?? last.close,
    yfPrevClose: m.chartPreviousClose   ?? null,
    volume:      m.regularMarketVolume  ?? last.volume,
    dayHigh:     m.regularMarketDayHigh ?? null,
    dayLow:      m.regularMarketDayLow  ?? null,
  };
}

// ─── Main load ────────────────────────────────────────────────────────────────
async function loadData(isRefresh) {
  setRefreshing(true);
  if (!isRefresh) showLoading();

  const cfg = FETCH_CFG[curIv];
  try {
    const json = await fetchYF(cfg);
    let { candles, price, yfPrevClose, volume, dayHigh, dayLow } = parseYF(json);

    if (cfg.resample > 1) candles = resample(candles, cfg.resample);

    // Shift to Prague local time for display
    const shifted = candles.map(c => ({ ...c, time: shiftTs(c.time) }));
    const closes  = candles.map(c => c.close);

    // ── Candles + volume ────────────────────────────────────────────────────
    serCandle.setData(shifted);
    serVol.setData(shifted.map(c => ({
      time: c.time, value: c.volume,
      color: c.close >= c.open ? '#1a3d2b' : '#3d1a1a',
    })));

    // ── EMA ─────────────────────────────────────────────────────────────────
    const e50  = calcEMA(closes, 50);
    const e200 = calcEMA(closes, 200);
    const e500 = calcEMA(closes, 500);
    const toLine = arr =>
      shifted.map((c, i) => arr[i] != null ? { time: c.time, value: +arr[i].toFixed(4) } : null).filter(Boolean);
    serEma50.setData(toLine(e50));
    serEma200.setData(toLine(e200));
    serEma500.setData(toLine(e500));
    const li = candles.length - 1;
    g('ev50').textContent  = e50[li]  != null ? e50[li].toFixed(3)  : '—';
    g('ev200').textContent = e200[li] != null ? e200[li].toFixed(3) : '—';
    g('ev500').textContent = e500[li] != null ? e500[li].toFixed(3) : '—';

    // ── Premium / Discount zones ─────────────────────────────────────────────
    const { high: swHigh, low: swLow } = findSwings(candles, SWING_STR);
    if (swHigh != null && swLow != null && swHigh > swLow) {
      const equil = (swHigh + swLow) / 2;
      const t0 = shifted[0].time;
      const t1 = shifted[shifted.length - 1].time;
      const flat = val => [{ time: t0, value: +val.toFixed(4) }, { time: t1, value: +val.toFixed(4) }];

      serZoneHigh.setData(flat(swHigh));
      serZoneEquil.setData(flat(equil));
      serZoneLow.setData(flat(swLow));

      // Premium area: from swingHigh down to equilibrium (baseValue)
      serPremiumArea.applyOptions({ baseValue: { type: 'price', price: equil } });
      serPremiumArea.setData(flat(swHigh));

      // Discount area: from equilibrium down to swingLow (baseValue)
      serDiscountArea.applyOptions({ baseValue: { type: 'price', price: swLow } });
      serDiscountArea.setData(flat(equil));

      // Labels on Y axis
      serZoneHigh.applyOptions({ title: 'Premium' });
      serZoneEquil.applyOptions({ title: 'Equil.' });
      serZoneLow.applyOptions({ title: 'Discount' });
    } else {
      // Clear zones if no valid swing points found
      const empty = [];
      [serZoneHigh, serZoneEquil, serZoneLow, serPremiumArea, serDiscountArea].forEach(s => s.setData(empty));
    }

    // ── RSI ──────────────────────────────────────────────────────────────────
    const rsiArr = calcRSI(closes, 14);
    serRsi.setData(toLine(rsiArr));
    const t0r = shifted[0].time, t1r = shifted[li].time;
    serRsiOB.setData( [{ time: t0r, value: 70 }, { time: t1r, value: 70 }]);
    serRsiOS.setData( [{ time: t0r, value: 30 }, { time: t1r, value: 30 }]);
    serRsiMid.setData([{ time: t0r, value: 50 }, { time: t1r, value: 50 }]);
    const lastRsi = rsiArr[li];
    g('ev-rsi').textContent = lastRsi != null ? lastRsi.toFixed(1) : '—';
    g('ev-rsi').style.color = rsiColor(lastRsi);

    // ── MACD ─────────────────────────────────────────────────────────────────
    const { macd, sig, hist } = calcMACD(closes, 12, 26, 9);
    serMacdLine.setData(toLine(macd));
    serMacdSignal.setData(toLine(sig));
    serMacdHist.setData(
      shifted
        .map((c, i) => hist[i] != null
          ? { time: c.time, value: +hist[i].toFixed(4), color: hist[i] >= 0 ? 'rgba(38,194,129,0.6)' : 'rgba(231,76,60,0.6)' }
          : null)
        .filter(Boolean)
    );
    const lm = macd[li], ls = sig[li], lh = hist[li];
    g('ev-macd').textContent = lm != null ? lm.toFixed(4) : '—';
    g('ev-sig').textContent  = ls != null ? ls.toFixed(4) : '—';
    g('ev-hist').textContent = lh != null ? lh.toFixed(4) : '—';
    g('ev-hist').style.color = lh == null ? '#555' : lh >= 0 ? '#26c281' : '#e74c3c';

    // ── Header ───────────────────────────────────────────────────────────────
    const baseline = getPrevDayClose(candles, yfPrevClose);
    const ch  = baseline != null ? price - baseline : null;
    const pct = ch != null && baseline ? ch / baseline * 100 : null;
    const up  = ch == null || ch >= 0;
    const clr = up ? '#26c281' : '#e74c3c';
    const sgn = up ? '+' : '';
    setText('price', price.toFixed(3));
    g('change').textContent    = ch  != null ? sgn + ch.toFixed(3)          : '—'; g('change').style.color    = clr;
    g('changePct').textContent = pct != null ? `(${sgn}${pct.toFixed(2)}%)` : ''; g('changePct').style.color = clr;
    setText('vol', volume ? Number(volume).toLocaleString('en-US') : '—');

    const today     = todayStr();
    const todayBars = candles.filter(c => dateStr(c.time) === today);
    const tH = todayBars.length ? todayBars.reduce((m, c) => Math.max(m, c.high), -Infinity) : null;
    const tL = todayBars.length ? todayBars.reduce((m, c) => Math.min(m, c.low),   Infinity) : null;
    setText('dhigh', (dayHigh ?? tH ?? candles.reduce((m, c) => Math.max(m, c.high), -Infinity)).toFixed(3));
    setText('dlow',  (dayLow  ?? tL ?? candles.reduce((m, c) => Math.min(m, c.low),   Infinity)).toFixed(3));

    if (!isRefresh) fitAll();
    hideOverlay();
    resetTimer();
  } catch (e) {
    console.error('loadData error:', e);
    if (!isRefresh) showErr(e.message || 'Unknown error');
  } finally {
    setRefreshing(false);
  }
}

// ─── Timer ────────────────────────────────────────────────────────────────────
function resetTimer() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => loadData(true), REFRESH_MS);
  setText('status', `Auto-refresh ${REFRESH_MS / 1000}s`);
}

// ─── UI helpers ───────────────────────────────────────────────────────────────
function g(id)          { return document.getElementById(id); }
function setText(id, v) { g(id).textContent = v; }

function clearTip() {
  g('hint').style.display = '';
  ['o','h','l','c'].forEach(k => g('oi-'+k).style.display = 'none');
  ['50','200','500'].forEach(p => g('ev'+p).textContent = '—');
  g('ev-rsi').textContent = '—'; g('ev-rsi').style.color = '#a78bfa';
  g('ev-macd').textContent = g('ev-sig').textContent = g('ev-hist').textContent = '—';
  g('ev-hist').style.color = '#555';
}
function setOI(k, v, c) {
  g('oi-'+k).style.display = 'flex';
  g('tv-'+k).textContent   = v;
  g('tv-'+k).style.color   = c;
}
function showLoading() {
  const o = g('overlay'); o.style.display = 'flex';
  o.innerHTML = '<div id="spin"></div><div id="load-msg">Loading market data…</div>';
}
function showErr(msg) {
  const o = g('overlay'); o.style.display = 'flex';
  o.innerHTML = `<div class="ebox"><p class="etit">⚠ Failed to load data</p><p class="emsg">${msg.replace(/\n/g,'<br>')}</p><button class="rbtn2" onclick="loadData(false)">Retry</button></div>`;
}
function hideOverlay()     { g('overlay').style.display = 'none'; }
function setRefreshing(on) {
  g('dot').style.background = on ? '#e7a22b' : '#26c281';
  if (on) setText('status', 'Loading…');
}

// ─── Controls ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.iv').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.iv').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    curIv = btn.dataset.iv;
    clearTip();
    loadData(false);
  });
});
g('fit-btn').addEventListener('click', () => fitAll());
g('rbtn').addEventListener('click',    () => loadData(false));

// ─── Boot ─────────────────────────────────────────────────────────────────────
function waitForLib(cb) {
  if (typeof LightweightCharts !== 'undefined') { cb(); return; }
  let n = 0;
  const id = setInterval(() => {
    if (typeof LightweightCharts !== 'undefined') { clearInterval(id); cb(); return; }
    if (++n > 100) { clearInterval(id); showErr('Failed to load chart library. Check connection.'); }
  }, 100);
}

waitForLib(() => {
  initCharts();   // all series created here — LightweightCharts is guaranteed available
  loadData(false);
});
</script>
